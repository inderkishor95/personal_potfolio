<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container{
      width:90%;
      height: 150px;
      border: 2px solid black;
      margin: auto;
      padding: auto;
      position:relative;
    }
    .box{
      width: 100px;
      height: 100px;
      background-color: red;
      margin: auto;
      float: left;
      position:absolute;
      top:20px;
      bottom: 20px;
      animation-name:box;
      animation-duration:2s;
      animation-iteration-count: infinite;
      animation-fill-mode: forwards;

      ;
    }
    @keyframes box{
      0%{
        background-color: red;
        left:0px;
      }
      50%{
        background-color: green;
      }
      100%{
        left: 500px;
        background-color: blue;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box"></div>
  </div>
</body>
</html>
